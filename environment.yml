# Reproducible conda environment for THIS fork of ACPYPE (with `abcg2` support).
#
# Run from the repository root (so the `-e .` pip entry installs THIS checkout):
#
#   git clone <this-repo> && cd acpype_ABGC2
#   conda env create -f environment.yml
#   conda activate acpype
#
# This pulls AmberTools (antechamber/tleap/parmchk2) and Open Babel from
# conda-forge -- so every charge method, including `abcg2` (AM1-BCC-GAFF2,
# requires AmberTools >= 24), works without any bundled binaries -- and then
# installs the local source as an editable package, so the `acpype` command
# runs the fork's code (NOT the upstream PyPI build, which lacks `abcg2`).
#
# NB: `-e .` is resolved relative to the directory you run `conda env create`
# from; run it from the repo root. To use the published upstream package
# instead, replace `- -e .` below with `- acpype`.
name: acpype
channels:
  - conda-forge
dependencies:
  - python >=3.9
  - ambertools >=24
  - openbabel
  - pip
  - pip:
      - -e .
